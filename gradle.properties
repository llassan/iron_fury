org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# AGP 8.2 predates Android 16 (API 36); we compile/target 36 to meet Google Play's
# target-API requirement. This suppresses AGP's "untested compileSdk" warning.
# Safe here: pure-Kotlin app with no use of new platform APIs. Upgrade AGP later
# to drop this flag.
android.suppressUnsupportedCompileSdk=36
